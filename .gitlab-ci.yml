# ---------------------------------------------------------
# CI/CD PIPELINE FOR TERRAFORM EKS PROJECT
# ---------------------------------------------------------

stages:
  - validate
  - plan
  - kube
  - build
  - deploy

# ---------------------------------------------------------
# 1. TERRAFORM FORMAT CHECK
# ---------------------------------------------------------
terraform_fmt:
  stage: validate
  tags:
    - ec2-runner
  image:
    name: hashicorp/terraform:light
    entrypoint: [""]            # Overrides the entrypoint to allow shell scripts
  script:
    - terraform fmt -check

# ---------------------------------------------------------
# 2. TERRAFORM VALIDATION
# ---------------------------------------------------------
terraform_validate:
  stage: validate
  tags:
    - ec2-runner
  image:
    name: hashicorp/terraform:light
    entrypoint: [""]
  script:
    - terraform init -backend=false
    - terraform validate

# ---------------------------------------------------------
# 3. TERRAFORM PLAN
# ---------------------------------------------------------
terraform_plan:
  stage: plan
  tags:
    - ec2-runner
  image:
    name: hashicorp/terraform:light
    entrypoint: [""]
  script:
    - terraform init
    - terraform plan -var-file=$TF_VARS_FILE -out=tfplan  # <--- Added -var-file here
  artifacts:
    paths:
      - tfplan

# ---------------------------------------------------------
# 4. KUBERNETES MANIFEST VALIDATION
# ---------------------------------------------------------
kube_validate:
  stage: kube
  tags:
    - ec2-runner
  image: alpine:3.19
  before_script:
    - apk add --no-cache curl
    - curl -L https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz | tar xz
    - mv kubeconform /usr/local/bin/kubeconform
  script:
    - kubeconform -strict -summary -ignore-missing-schemas kubernetes/


# ---------------------------------------------------------
# 6. MANUAL DEPLOY TO EKS
# ---------------------------------------------------------

notify_deploy_waiting:
  stage: deploy
  tags:
    - ec2-runner
  image: curlimages/curl:latest
  script:
    - >
      curl -X POST -H "Content-type: application/json" --data "{\"text\":\"🚦 Deploy to EKS is waiting for approval.\nBranch: $CI_COMMIT_BRANCH\nCommit: $CI_COMMIT_SHORT_SHA\"}" "$SLACK_WEBHOOK_URL"
  when: on_success
  allow_failure: true
  only:
    - main



deploy:
  stage: deploy
  tags:
    - ec2-runner
  image: 
    name: alpine/k8s:1.27.3     # Image with both aws-cli and kubectl
    entrypoint: [""]
  script:
    - aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_DEFAULT_REGION
    - kubectl apply -f kubernetes/
  when: manual
  only:
    - main
