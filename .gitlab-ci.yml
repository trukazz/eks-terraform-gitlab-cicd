# ---------------------------------------------------------
# CI/CD PIPELINE FOR TERRAFORM EKS PROJECT
# ---------------------------------------------------------

stages:
  - validate
  - plan
  - apply
  - kube
  - deploy
  - destroy

# ---------------------------------------------------------
# 1. TERRAFORM FORMAT CHECK
# ---------------------------------------------------------
terraform_fmt:
  stage: validate
  image:
    name: hashicorp/terraform:light
    entrypoint: [""]
  script:
    - terraform fmt -check

# ---------------------------------------------------------
# 2. TERRAFORM VALIDATION
# ---------------------------------------------------------
terraform_validate:
  stage: validate
  image:
    name: hashicorp/terraform:light
    entrypoint: [""]
  script:
    - terraform init -backend=false
    - terraform validate

# ---------------------------------------------------------
# 3. TERRAFORM PLAN
# ---------------------------------------------------------
terraform_plan:
  stage: plan
  image:
    name: hashicorp/terraform:light
    entrypoint: [""]
  script:
    - terraform init
    - terraform plan -var-file=$TF_VARS_FILE -out=tfplan
  artifacts:
    paths:
      - tfplan

# ---------------------------------------------------------
# 4. TERRAFORM APPLY (CREATES EKS CLUSTER)
# ---------------------------------------------------------
terraform_apply:
  stage: apply
  image:
    name: hashicorp/terraform:light
    entrypoint: [""]
  script:
    - terraform init
    - terraform apply -auto-approve -var-file=$TF_VARS_FILE
  when: manual
  only:
    - main
  dependencies:
    - terraform_plan

# ---------------------------------------------------------
# 5. KUBERNETES MANIFEST VALIDATION
# ---------------------------------------------------------
kube_validate:
  stage: kube
  image: alpine:3.19
  before_script:
    - apk add --no-cache curl
    - curl -L https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz | tar xz
    - mv kubeconform /usr/local/bin/kubeconform
  script:
    - kubeconform -strict -summary -ignore-missing-schemas kubernetes/

# ---------------------------------------------------------
# 6. DEPLOY TO EKS
# ---------------------------------------------------------
deploy:
  stage: deploy
  image:
    name: alpine/k8s:1.27.3
    entrypoint: [""]
  script:
    - aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_DEFAULT_REGION
    - kubectl apply -f kubernetes/
  when: manual
  only:
    - main

##########################################################################
# Destroy stage
###########################################################################

destroy:
  stage: destroy
  script:
    - terraform init
    - terraform destroy -auto-approve
  when: manual
  allow_failure: false
